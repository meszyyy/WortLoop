<main class="app">
  @if (mode() === 'setup') {
    <section class="setup">
      <h1 class="brand">WortLoop</h1>
      <p class="lead">Hány kártyával szeretnél gyakorolni?</p>

      <div class="chips">
        @for (c of presets; track c) {
          <button
            type="button"
            class="chip"
            [class.active]="selectedCount() === c"
            (click)="pick(c)"
          >
            {{ c }}
          </button>
        }
      </div>

      <label class="custom">
        <span>Egyéni mennyiség (1–100)</span>
        <input
          type="number"
          min="1"
          max="100"
          [value]="selectedCount()"
          (input)="onCustomCount($event)"
        />
      </label>

      <button type="button" class="btn primary start" (click)="start()" [disabled]="loading()">
        {{ loading() ? 'Töltés…' : 'Kezdés (' + selectedCount() + ' kártya)' }}
      </button>

      @if (error()) {
        <p class="status error">{{ error() }}</p>
      }
    </section>
  } @else {
    <header class="topbar">
      <h1 class="brand">WortLoop</h1>
      <div class="topbar-right">
        <span class="counter">{{ position() }}</span>
        <button type="button" class="link" (click)="restart()">Új pakli</button>
      </div>
    </header>

    @if (current(); as card) {
      <app-card [card]="card" [flipped]="flipped()" (toggle)="flip()" />

      <div class="controls">
        <button type="button" class="btn ghost" (click)="prev()" [disabled]="index() === 0">
          ‹ Előző
        </button>
        <button type="button" class="btn primary" (click)="flip()">
          {{ flipped() ? 'Vissza' : 'Fordítás' }}
        </button>
        <button type="button" class="btn ghost" (click)="next()" [disabled]="isLast()">
          Következő ›
        </button>
      </div>

      @if (isLast()) {
        <p class="status">Ez volt az utolsó kártya. 🎉</p>
      }
    }
  }
</main>
